name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout virome-qc
        uses: actions/checkout@v4

      - name: Checkout biometal
        uses: actions/checkout@v4
        with:
          repository: shandley/biometal
          path: biometal

      - name: Override biometal path for CI
        run: |
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [patch.crates-io]
          # Not needed since we use path dep

          # Override the local path to the CI checkout
          EOF

          # Rewrite Cargo.toml to point to CI biometal checkout
          sed -i.bak 's|path = "/Users/scotthandley/Code/tools/biometal"|path = "biometal"|' Cargo.toml

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Clippy
        run: cargo clippy -- -D warnings

  format:
    name: Format check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout virome-qc
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check
