name: "Short Read - NEBNext + Host Depletion"
description: "Short-read sequencing with NEBNext library prep and human host depletion."
platform: illumina

modules:
  adapter:
    enabled: true
    sequences: [nebnext, truseq_universal]
    internal_scan: false
    random_primer_trim: 0
    min_overlap: 8
    max_mismatch_rate: 0.1
  quality:
    enabled: true
    window_size: 10
    min_quality: 15
    min_mean_quality: 20.0
    min_length: 40
  polyx:
    enabled: true
    platform_aware: true
    min_length: 8
  complexity:
    enabled: true
    min_entropy: 0.5
  contaminant:
    enabled: true
    screen_rrna: true
    screen_phix: true
    screen_vectors: true
    screen_kitome: false
    min_kmer_fraction: 0.25
  host:
    enabled: true
    reference: benchmark_data/references/human_t2t.sbf
    host_threshold: 0.50
    ambiguous_threshold: 0.20
    eve_aware: false
    rescue: false
  dedup:
    enabled: true
    optical_distance: 2500
    umi_aware: false
  chimera:
    enabled: false

thresholds:
  min_survival_rate: 0.10
  max_host_fraction: 0.80
  max_rrna_fraction: 0.15
  max_duplicate_rate: 0.50
  expected_gc_range: [0.35, 0.65]
